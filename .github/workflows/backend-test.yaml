name: Backend build and test

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*.*.*'
      - v*.*.*-rc.*
    paths:
      - 'fleetmanager/**'
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'poetry.lock'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - uses: actions/checkout@v7

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          push: false
